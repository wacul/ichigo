name: Review
on: [pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-golangci-lint@v2
        with:
          golangci_lint_version: v2.11.3
          level: info
          github_token: ${{ secrets.GITHUB_TOKEN }}
